<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Amina ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#3d1a5d,#7d3cff,#b388ff);
overflow:hidden;
color:white;
text-align:center;
}

.container{
z-index:2;
padding:30px;
}

h1{
font-size:3em;
margin-bottom:15px;
}

p{
font-size:1.2em;
max-width:600px;
margin:auto;
margin-bottom:30px;
}

button{
padding:15px 35px;
font-size:18px;
border:none;
border-radius:50px;
background:white;
color:#7d3cff;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

.heart{
position:absolute;
color:#ff8ac6;
font-size:22px;
animation:float 10s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}
</style>
</head>

<body>

<div class="container">
<h1>Good Morning, Amina 💜</h1>

<p>
I made this little place just for you.
Every page holds a piece of my heart.
I hope every visit reminds you how deeply you are loved.
</p>

<button onclick="alert('Welcome to our little world ❤️')">
Begin
</button>
</div>

<script>
for(let i=0;i<40;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(5+Math.random()*6)+"s";
h.style.fontSize=(15+Math.random()*25)+"px";
document.body.appendChild(h);
}
</script>

</body>
</html>
