<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Letters For You</title>

<link rel="stylesheet" href="../style.css">

<style>

body{

background:linear-gradient(135deg,#b57cff,#f6e8ff);

padding:60px;

min-height:100vh;

}

h1{

text-align:center;

margin-bottom:40px;

color:white;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:30px;

}

.card{

background:white;

border-radius:25px;

padding:30px;

cursor:pointer;

transition:.3s;

box-shadow:0 10px 30px rgba(0,0,0,.15);

}

.card:hover{

transform:translateY(-8px);

}

.card h2{

color:#7a3cff;

margin-bottom:15px;

}

.popup{

display:none;

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,.6);

justify-content:center;

align-items:center;

padding:20px;

}

.popup-content{

background:white;

padding:40px;

max-width:700px;

border-radius:25px;

line-height:1.8;

position:relative;

color:#333;

max-height:80vh;

overflow:auto;

}

.close{

position:absolute;

top:15px;

right:20px;

font-size:30px;

cursor:pointer;

}

.next{

display:inline-block;

margin-top:30px;

padding:15px 30px;

background:#7a3cff;

color:white;

border-radius:50px;

text-decoration:none;

}

</style>

</head>

<body>

<h1>💌 Letters From My Heart</h1>

<div class="grid">

<div class="card" onclick="openLetter(1)">
<h2>🌷 Letter One</h2>
<p>The Day Everything Changed</p>
</div>

<div class="card" onclick="openLetter(2)">
<h2>❤️ Letter Two</h2>
<p>Why I Love You</p>
</div>

<div class="card" onclick="openLetter(3)">
<h2>🌙 Letter Three</h2>
<p>When You Miss Me</p>
</div>

<div class="card" onclick="openLetter(4)">
<h2>☀️ Letter Four</h2>
<p>Good Morning</p>
</div>

<div class="card" onclick="openLetter(5)">
<h2>💍 Letter Five</h2>
<p>Our Future</p>
</div>

</div>

<div class="popup" id="popup">

<div class="popup-content">

<span class="close" onclick="closeLetter()">&times;</span>

<h2 id="title"></h2>

<p id="text"></p>

<a class="next" href="gallery.html">
Continue Our Journey →
</a>

</div>

</div>

<script>

const letters={

1:{
title:"The Day Everything Changed",
text:"One day, without even realizing it, my ordinary days began to feel extraordinary because of you..."
},

2:{
title:"Why I Love You",
text:"I love the kindness in your heart, your beautiful soul, and the peace I feel whenever I talk to you..."
},

3:{
title:"When You Miss Me",
text:"Whenever distance feels heavy, remember that every heartbeat carries your name..."
},

4:{
title:"Good Morning",
text:"If you're reading this in the morning, I hope today brings you as much happiness as you've brought into my life..."
},

5:{
title:"Our Future",
text:"My greatest dream isn't simply to love you today. It's to work hard until the day I can proudly call you my wife..."
}

};

function openLetter(n){

document.getElementById("popup").style.display="flex";

document.getElementById("title").innerText=letters[n].title;

document.getElementById("text").innerText=letters[n].text;

}

function closeLetter(){

document.getElementById("popup").style.display="none";

}

</script>

</body>

</html>
