<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>100 Reasons</title>

<style>

body{

margin:0;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#b57cff,#f8efff);

font-family:Arial,Helvetica,sans-serif;

}

.card{

background:white;

width:90%;

max-width:700px;

padding:50px;

border-radius:30px;

text-align:center;

box-shadow:0 20px 40px rgba(0,0,0,.2);

}

h1{

color:#7a3cff;

margin-bottom:30px;

}

#reason{

font-size:24px;

min-height:120px;

display:flex;

justify-content:center;

align-items:center;

line-height:1.8;

}

button{

padding:18px 35px;

font-size:18px;

border:none;

background:#7a3cff;

color:white;

border-radius:50px;

cursor:pointer;

margin-top:25px;

}

a{

display:inline-block;

margin-top:30px;

text-decoration:none;

background:white;

padding:16px 30px;

border-radius:50px;

color:#7a3cff;

font-weight:bold;

}

</style>

</head>

<body>

<div class="card">

<h1>❤️ Reasons I Love You ❤️</h1>

<div id="reason">

Click the button...

</div>

<button onclick="nextReason()">

Reveal Another ❤️

</button>

<br>

<a href="countdown.html">

Our Time Together ⏳

</a>

</div>

<script>

const reasons=[

"Your kindness",

"Your beautiful heart",

"The way you make me smile",

"The peace I feel when I talk to you",

"Your thoughtfulness",

"The way you care",

"Your laugh",

"Your patience",

"The way you understand me",

"You make ordinary days special",

"You inspire me to become better",

"You make me feel safe",

"You are beautiful inside and out",

"You never leave my mind",

"I admire your strength",

"Your voice calms me",

"Your smile lights my world",

"You make distance feel smaller",

"You're my favorite person",

"My heart feels at home with you"

];

let i=0;

function nextReason(){

document.getElementById("reason").innerHTML=reasons[i];

i++;

if(i>=reasons.length){

i=0;

}

}

</script>

</body>

</html>
